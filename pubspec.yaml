name: sistema_compras
description: "Sistema de compras con Firebase y Flutter"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_database: ^11.0.0
  cloud_functions: ^5.0.0
  firebase_messaging: ^15.0.0
  firebase_storage: ^12.0.0
  flutter_riverpod: ^3.0.0
  riverpod: ^3.0.0
  go_router: ^14.0.0
  intl: ^0.19.0
  url_launcher: ^6.2.6
  csv: ^6.0.0
  file_picker: ^8.0.6
  file_selector: ^1.0.3
  pdf: ^3.10.8
  printing: ^5.12.0
  pdfx: ^2.5.0
  photo_view: ^0.15.0
  lottie: ^2.7.0
  state_notifier: ^1.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.3
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - evidencias/LOGO CHABELY.png
    - evidencias acerpro/ACERPRO_LOGO_1500_TRIM.png
    - logo-generico.png
    - assets/animations/lottie2.json
    - assets/fonts/arial.ttf
    - assets/fonts/arialbd.ttf
